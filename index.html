<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyze-AI</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="responsive.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <span class="dot pulse"></span>
      Analyze-AI
    </div>
    <div class="version-tag">Version 0.1.0</div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <a class="nav-item active">Dashboard</a>
    <a class="nav-item">Analysis</a>
    <a class="nav-item">History</a>
    <a class="nav-item">Settings</a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- UPLOAD CARD -->
    <section class="card upload-card" id="dropzone">
      <div class="section-title"><span class="title-icon">📂</span> Upload Historical Data</div>
      <svg class="upicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/>
      </svg>
      <p class="hint">Seret file CSV ke sini, atau pilih file secara manual</p>
      <button class="btn btn-outline" id="chooseBtn" type="button">Choose CSV</button>
      <input type="file" id="fileInput" accept=".csv">
      <div class="file-name" id="fileName"></div>
    </section>

    <!-- ANALYZE CARD -->
    <section class="card analyze-card">
      <button class="btn btn-primary" id="analyzeBtn" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="btnLabel">Analyze</span>
      </button>
    </section>

    <!-- RESULT CARD -->
    <section class="card result-card">
      <div class="section-title">Market Information</div>
      <div class="result-row">
        <span class="key">Symbol</span>
        <span class="val waiting" id="symbolVal">-</span>
      </div>
      <div class="result-row">
        <span class="key">Last Price</span>
        <span class="val waiting" id="priceVal">-</span>
      </div>
      <div class="result-row">
        <span class="key">Volume</span>
        <span class="val waiting" id="volumeVal">-</span>
      </div>

      <hr class="divider">

      <div class="section-title">Result</div>
      <div class="result-row">
        <span class="key">Trend</span>
        <span class="val waiting" id="trendVal">-</span>
      </div>
      <div class="result-row">
        <span class="key">Swing</span>
        <span class="val waiting" id="swingVal">-</span>
      </div>
    </section>

    <!-- STATUS CARD -->
    <section class="card status-card">
      <div class="section-title">Status</div>
      <div class="result-row">
        <span class="key">Engine</span>
        <span class="val waiting" id="statusVal">Waiting...</span>
      </div>
    </section>

  </main>
</div>

<script src="js/app.js"></script>

</body>
</html>
